<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registro Enhuertando</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin: 0; padding: 0; }
.container { max-width: 900px; margin: auto; padding: 20px; }

label { font-weight: bold; display: block; margin-top: 15px; }
input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; }

#map { height: 350px; margin-top: 10px; }

.pin-status {
  margin-top: 10px;
  font-weight: bold;
}

.green { color: green; }
.gray { color: gray; }

button { margin-top: 20px; padding: 10px; }
</style>
</head>

<body>

<div class="container">

<h2>Registro de iniciativa</h2>

<!-- NOMBRE -->
<label>Nombre de la iniciativa *</label>
<input id="nombre" type="text"/>

<!-- DESCRIPCION -->
<label>Descripción (opcional)</label>
<textarea id="descripcion"></textarea>

<!-- TIPO -->
<label>Tipo de iniciativa *</label>
<select id="tipo" multiple>
  <option>Huerto familiar</option>
  <option>Huerto comunitario</option>
  <option>Huerto escolar</option>
  <option>Huerto comercial</option>
  <option>Mercado o tianguis</option>
  <option>Tienda</option>
  <option>Organización civil</option>
  <option>Colectiva o colectivo</option>
  <option>Cooperativa</option>
  <option>Banco o intercambio de semillas</option>
  <option>Proyecto educativo o conversatorios</option>
  <option>Cocina o restaurante</option>
  <option>Espacio demostrativo</option>
  <option>Otro</option>
</select>

<!-- OFRECE -->
<label>¿Qué ofrece? (opcional)</label>
<select id="ofrece" multiple>
  <option>Talleres</option>
  <option>Capacitación</option>
  <option>Trueque o intercambio</option>
  <option>Venta de alimentos</option>
  <option>Venta de plantas</option>
  <option>Venta de semillas</option>
  <option>Intercambio de semillas</option>
  <option>Composta o lombricomposta</option>
  <option>Insumos para siembra</option>
  <option>Asesoría técnica</option>
  <option>Voluntariado</option>
  <option>Actividades comunitarias</option>
  <option>Actividades artísticas</option>
  <option>Consumo local</option>
  <option>Productos listos para consumir</option>
</select>

<!-- MUNICIPIO -->
<label>Municipio *</label>
<input id="busquedaMunicipio" placeholder="Escribe para buscar..." />
<select id="municipio"></select>

<!-- MAPA -->
<label>Ubicación *</label>
<input type="checkbox" id="aproximada"/> Prefiero no indicar ubicación exacta

<div id="map"></div>

<div class="pin-status" id="estadoPin">Sin ubicación seleccionada</div>

<!-- CONTACTO -->
<label>Datos de contacto (WhatsApp, correo, redes sociales) (opcional)</label>
textarea id="contacto"></textarea>

<button onclick="enviar()">Enviar</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ---------------- MUNICIPIOS BASE (simplificado aquí) ----------------
const municipios = [
  "Abejones",
  "Acatlán de Pérez Figueroa",
  "Asunción Nochixtlán",
  "Oaxaca de Juárez",
  "Santo Domingo Tehuantepec",
  "Juchitán de Zaragoza",
  "Huajuapan de León"
];

// llenar select
const select = document.getElementById("municipio");
municipios.forEach(m => {
  let opt = document.createElement("option");
  opt.value = m;
  opt.textContent = m;
  select.appendChild(opt);
});

// búsqueda simple
document.getElementById("busquedaMunicipio").addEventListener("input", function(e){
  const val = e.target.value.toLowerCase();
  select.innerHTML = "";
  municipios
    .filter(m => m.toLowerCase().includes(val))
    .forEach(m => {
      let opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      select.appendChild(opt);
    });
});

// ---------------- MAPA ----------------
const map = L.map('map').setView([17.0732, -96.7266], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

let marker = null;
let modoAproximado = false;

// click para pin verde
map.on("click", function(e){
  if (modoAproximado) return;

  if (marker) map.removeLayer(marker);

  marker = L.marker(e.latlng, { draggable: true, icon: greenIcon() }).addTo(map);

  marker.on("dragend", updateStatus);

  updateStatus();
});

// icono verde/gris
function greenIcon(){
  return new L.Icon({
    iconUrl: "https://maps.gstatic.com/mapfiles/ms2/micons/green-dot.png",
    iconSize: [32,32]
  });
}
function grayIcon(){
  return new L.Icon({
    iconUrl: "https://maps.gstatic.com/mapfiles/ms2/micons/grey-dot.png",
    iconSize: [32,32]
  });
}

// checkbox aproximada
document.getElementById("aproximada").addEventListener("change", async function(e){
  modoAproximado = e.target.checked;

  if (modoAproximado) {
    if (marker) map.removeLayer(marker);

    const mun = select.value;
    const coords = await geocodeMunicipio(mun);

    if (coords) {
      marker = L.marker(coords, { icon: grayIcon(), draggable: false }).addTo(map);
      map.setView(coords, 10);
    }

    document.getElementById("estadoPin").innerText = "Ubicación aproximada";
    document.getElementById("estadoPin").className = "pin-status gray";
  } else {
    if (marker) map.removeLayer(marker);
    marker = null;

    document.getElementById("estadoPin").innerText = "Selecciona un punto en el mapa";
  }
});

// geocoding municipio
async function geocodeMunicipio(nombre){
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(nombre + ", Oaxaca, Mexico, palacio municipal")}&limit=1`;
  const res = await fetch(url);
  const data = await res.json();

  if (data.length > 0) {
    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
  }
  return null;
}

function updateStatus(){
  document.getElementById("estadoPin").innerText = "Ubicación exacta seleccionada";
  document.getElementById("estadoPin").className = "pin-status green";
}

// ---------------- ENVÍO ----------------
function enviar(){
  const data = {
    nombre: document.getElementById("nombre").value,
    descripcion: document.getElementById("descripcion").value,
    municipio: document.getElementById("municipio").value,
    tipo: [...document.getElementById("tipo").selectedOptions].map(o => o.value),
    ofrece: [...document.getElementById("ofrece").selectedOptions].map(o => o.value),
    contacto: document.getElementById("contacto").value || "Sin datos de contacto disponibles",
    ubicacion: marker ? marker.getLatLng() : null,
    tipo_ubicacion: modoAproximado ? "aproximada" : "exacta"
  };

  console.log(data);
  alert("Formulario listo (ver consola)");
}
</script>

</body>
</html>
